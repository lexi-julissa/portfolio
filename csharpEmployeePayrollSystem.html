<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* Apply a dark theme to the body */
        body {
            background-color: #1b1b1b; /* Dark background */
            color: #e6e6e6; /* Light text color for contrast */
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        h2 {
            color: #c59dfd; /* Soft purple for heading */
            font-size: 1.8em;
            text-align: center;
            margin-bottom: 15px;
        }

        /* Style the iframe for the game */
        iframe {
            border: 3px solid #7f5ed9; /* Purple border around the iframe */
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(127, 94, 217, 0.5); /* Soft glow effect */
        }

        /* Style the paragraph below the iframe */
        p {
            color: #a09fa4; /* Light gray text color */
            font-size: 1em;
            margin-top: 10px;
            text-align: center;
        }

        /* Additional styling for a cohesive dark theme */
        .container {
            background-color: #222; /* Slightly lighter background for contrast */
            padding: 20px;
            border-radius: 10px;
            max-width: 700px;
            width: 100%;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.7);
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Employee Payroll System (C#)</h2>
<iframe width="100%" height="475" src="https://dotnetfiddle.net/Widget/Ppvb2v" frameborder="0"></iframe>
    </div>
</body>
</html>
